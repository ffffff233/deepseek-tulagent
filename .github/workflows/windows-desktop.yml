name: windows-desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install installer compiler
        shell: pwsh
        run: choco install innosetup --yes --no-progress
      - name: Build Windows desktop exe and installer
        shell: pwsh
        run: ./scripts/build_windows_exe.ps1
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeepSeekFathom-windows
          path: |
            dist/DeepSeekFathom/**
            dist/installer/*.exe
      - name: Publish installer on tagged releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/installer/*.exe

