<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DeepSeekFathom</title>
  <link rel="icon" type="image/png" href="app-icon.png">
  <script>document.documentElement.dataset.theme = localStorage.getItem("deepseekfathom.theme") === "light" ? "light" : "dark";</script>
  <link rel="stylesheet" href="katex-fathom.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <img src="app-icon.png" alt="">
        </div>
        <div class="brandText">
          <strong>DeepSeekFathom</strong>
          <span id="version">v0.1.4</span>
        </div>
        <button id="toggleSidebar" class="collapseBtn" title="收起 / 展开侧栏" aria-label="折叠侧栏"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M11 17l-5-5 5-5"/><path d="M18 17l-5-5 5-5"/></svg></button>
      </div>
      <button id="newSession" class="primary wide newBtn"><span class="plusGlyph" aria-hidden="true"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></span> 新对话</button>
      <section class="panel sessionsPanel">
        <div class="panelHead">
          <h2>会话</h2>
          <button id="refreshSessions" class="ghost small">刷新</button>
        </div>
        <div class="sessionScroll">
          <div id="sessions" class="navList subtle">暂无会话</div>
          <div id="sessionScrollbar" class="sessionScrollbar" aria-hidden="true">
            <div id="sessionScrollThumb" class="sessionScrollThumb"></div>
          </div>
        </div>
      </section>
      <button id="settingsBtn" class="sidebarSettings" type="button" title="设置">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2.8 2.8-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6v.2h-4V21a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1L4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9A1.7 1.7 0 0 0 3 14H2.8v-4H3a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9L4.2 7 7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3A1.7 1.7 0 0 0 10 3V2.8h4V3a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1L19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.2v4H21a1.7 1.7 0 0 0-1.6 1z"/></svg>
        <span>设置</span>
      </button>
    </aside>

    <section id="chatPane" class="chatPane">
      <header class="toolbar">
        <div class="topIdentity">
          <button id="toggleSidebarTop" class="railBtn" title="侧栏" aria-label="侧栏"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/></svg></button>
          <span class="pulse"></span>
          <strong>DeepSeekFathom</strong>
          <small id="topRuntime">启动中</small>
        </div>
        <div class="toolbarActions">
          <span id="workspace" class="workspace"></span>
          <button id="manualCompact" class="ghost small" title="压缩上下文">压缩</button>
          <div class="convMenuWrap">
            <button id="convMenuBtn" class="railBtn" title="对话操作" aria-label="对话操作"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1.4" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="12" cy="19" r="1.4" fill="currentColor" stroke="none"/></svg></button>
            <div id="convMenu" class="convMenu" hidden>
              <button class="convItem" data-act="copyId">复制会话 ID</button>
              <button class="convItem" data-act="rename">重命名对话</button>
              <button class="convItem" data-act="branch">从最新回复开分支</button>
              <button class="convItem" data-act="new">新建对话</button>
              <button class="convItem danger" data-act="delete">删除对话</button>
            </div>
          </div>
        </div>
      </header>

      <div id="messages" class="messages">
        <div class="empty intro">
          <img class="introLogo" src="app-icon.png" alt="">
          <h1>深入每一寻的本地代理</h1>
          <p>输入任务开始对话。输入 <kbd>/</kbd> 可调出技能与命令菜单，工具调用与输出在同一卡片内分层展开。</p>
        </div>
      </div>

      <footer class="composer">
        <div id="attachments" class="attachments"></div>
        <div id="goalDock" class="goalDock" hidden></div>
        <div class="composeCard">
          <div id="ctxPopover" class="ctxPopover" hidden>
            <div class="ctxPopHead">
              <strong>上下文统计</strong>
              <span id="ctxSource">估算</span>
            </div>
            <div class="ctxMetric"><span>当前上下文</span><strong id="ctxUsage">0 / 0</strong></div>
            <div class="ctxMetric"><span>当前请求输入</span><strong id="ctxInput">未知</strong></div>
            <div class="ctxMetric"><span>会话累计输入</span><strong id="ctxSessionInput">未知</strong></div>
            <div class="ctxMetric"><span>压缩阈值</span><strong id="ctxThreshold">0</strong></div>
            <div class="ctxMetric"><span>阈值剩余</span><strong id="ctxRemaining">0</strong></div>
            <div class="ctxBar"><i id="ctxBarFill"></i></div>
            <div class="ctxControls">
              <label>模型上下文 <input id="ctxLimitInput" inputmode="numeric" placeholder="自动识别"></label>
              <label>压缩阈值% <input id="ctxThresholdInput" inputmode="decimal" placeholder="95"></label>
              <button id="ctxSave" type="button">保存</button>
            </div>
            <p id="ctxHint">达到阈值前会自动压缩旧消息。</p>
          </div>
          <button id="contextBadge" class="contextBadge idle" type="button" title="上下文统计">
            <span class="ctxDot"></span>
            <span id="ctxPct">上下文 0%</span>
          </button>
          <div id="slashMenu" class="slashMenu" hidden></div>
          <textarea id="prompt" rows="1" placeholder="输入任务，Enter 发送，Shift+Enter 换行，/ 调出命令"></textarea>
          <div class="composeRow">
            <input id="fileInput" type="file" multiple hidden>
            <button id="attach" class="composeIcon attach" title="添加文件" aria-label="添加文件">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            </button>
            <div class="composerControl">
              <select id="model" title="模型"></select>
              <select id="thinking" title="思考强度"></select>
              <select id="mode" title="权限模式"></select>
              <select id="format" title="接口格式"></select>
            </div>
            <span class="grow"></span>
            <div class="saveState">
              <span id="saveDot" class="saveDot"></span>
              <strong id="saveState">新会话</strong>
              <small id="composerSession">未保存</small>
            </div>
            <button id="send" class="composeIcon send" title="发送" aria-label="发送">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
            </button>
            <button id="cancel" class="composeIcon stop" type="button" title="中断生成" aria-label="中断生成" hidden>
              <svg viewBox="0 0 24 24" width="14" height="14"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>
            </button>
          </div>
        </div>
      </footer>
    </section>

    <section id="settingsView" class="settingsView" hidden>
      <header class="settingsTopbar">
        <button id="settingsBackTop" class="settingsBack" type="button" aria-label="返回对话">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
          <span>返回对话</span>
        </button>
        <strong>设置</strong>
      </header>
      <div class="settingsPage">
        <div class="settingsContent">
          <section class="settingsSection">
            <div class="settingsHeading">
              <h1>API 设置</h1>
              <p>配置模型服务地址与密钥，保存后立即应用到新请求。</p>
            </div>
            <label>接口格式
              <select id="providerFormat">
                <option value="deepseek">DeepSeek</option>
                <option value="openai">OpenAI (Chat)</option>
                <option value="openai-responses">OpenAI (Responses·最新)</option>
                <option value="gemini">Google Gemini</option>
                <option value="anthropic">Anthropic Claude</option>
              </select>
            </label>
            <label>Base URL
              <input id="baseUrl" placeholder="留空自动选用该格式默认域名">
            </label>
            <label>API Key
              <input id="apiKey" type="password" autocomplete="off" placeholder="留空则保留原密钥">
            </label>
            <label>接口超时（秒）
              <input id="requestTimeout" type="number" min="15" max="300" step="5" value="60" inputmode="numeric">
            </label>
            <div id="testResult" class="testResult" hidden></div>
            <div class="settingsActions">
              <button id="testConn" type="button" class="ghost">测试连接</button>
              <button id="saveSettings" type="button" class="primary">保存设置</button>
            </div>
          </section>
          <section class="settingsSection">
            <div class="settingsHeading">
              <h2>外观</h2>
              <p>选择界面配色，默认使用黑色主题。</p>
            </div>
            <div class="themeRow">
              <span>颜色主题</span>
              <div class="themeSwitch" role="group" aria-label="颜色主题">
                <button type="button" data-theme-value="dark">黑色</button>
                <button type="button" data-theme-value="light">白色</button>
              </div>
            </div>
          </section>
        </div>
        <footer class="settingsFooter">
          <button id="settingsBackBottom" class="settingsBack" type="button">
            <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
            <span>返回对话</span>
          </button>
        </footer>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
