<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fathom</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="22" height="22"><path d="M2 20c4-6 8-6 12 0s8 6 12 0" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><path d="M4 26c3.5-4.5 6.5-4.5 10 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity=".55"/></svg>
        </div>
        <div class="brandText">
          <strong>Fathom</strong>
          <span id="version">v0.0.0</span>
        </div>
        <button id="toggleSidebar" class="collapseBtn" title="收起 / 展开侧栏" aria-label="折叠侧栏"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M11 17l-5-5 5-5"/><path d="M18 17l-5-5 5-5"/></svg></button>
      </div>
      <button id="newSession" class="primary wide newBtn"><span class="plusGlyph" aria-hidden="true"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></span> 新对话</button>
      <section class="panel">
        <div class="panelHead">
          <h2>会话</h2>
          <button id="refreshSessions" class="ghost small">刷新</button>
        </div>
        <div id="sessions" class="navList subtle">暂无会话</div>
      </section>
    </aside>

    <section class="chatPane">
      <header class="toolbar">
        <div class="topIdentity">
          <button id="toggleSidebarTop" class="railBtn" title="侧栏" aria-label="侧栏"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/></svg></button>
          <span class="pulse"></span>
          <strong>Fathom</strong>
          <small id="topRuntime">ready</small>
        </div>
        <div class="toolbarActions">
          <span id="workspace" class="workspace"></span>
          <button id="manualCompact" class="ghost small" title="压缩上下文">压缩</button>
          <button id="settingsBtn" class="ghost">设置</button>
        </div>
      </header>

      <div id="messages" class="messages">
        <div class="empty intro">
          <div class="introMark">Fathom</div>
          <h1>深入每一寻的本地代理</h1>
          <p>输入任务开始对话。输入 <kbd>/</kbd> 可调出技能与命令菜单，工具调用与输出在同一卡片内分层展开。</p>
        </div>
      </div>

      <footer class="composer">
        <div id="attachments" class="attachments"></div>
        <div class="composeCard">
          <div id="slashMenu" class="slashMenu" hidden></div>
          <textarea id="prompt" rows="1" placeholder="输入任务，Enter 发送，Shift+Enter 换行，/ 调出命令"></textarea>
          <div class="composeRow">
            <input id="fileInput" type="file" multiple hidden>
            <button id="attach" class="composeIcon attach" title="添加文件" aria-label="添加文件">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            </button>
            <div class="composerControl">
              <select id="model" title="模型"></select>
              <select id="thinking" title="思考强度"></select>
              <select id="mode" title="权限模式"></select>
              <select id="format" title="接口格式"></select>
            </div>
            <span class="grow"></span>
            <div class="saveState">
              <span id="saveDot" class="saveDot"></span>
              <strong id="saveState">新会话</strong>
              <small id="composerSession">未保存</small>
            </div>
            <button id="send" class="composeIcon send" title="发送" aria-label="发送">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
            </button>
            <button id="cancel" class="composeIcon stop" type="button" title="中断生成" aria-label="中断生成" hidden>
              <svg viewBox="0 0 24 24" width="14" height="14"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>
            </button>
          </div>
        </div>
      </footer>
    </section>

    <dialog id="settingsDialog">
      <form method="dialog" class="settings">
        <header>
          <div>
            <h2>API 设置</h2>
            <p>支持 DeepSeek、OpenAI、Google Gemini、Anthropic Claude 接口。保存后立即生效。</p>
          </div>
          <button value="cancel" class="iconClose" aria-label="关闭"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg></button>
        </header>
        <label>接口格式
          <select id="providerFormat">
            <option value="deepseek">DeepSeek</option>
            <option value="openai">OpenAI (Chat)</option>
            <option value="openai-responses">OpenAI (Responses·最新)</option>
            <option value="gemini">Google Gemini</option>
            <option value="anthropic">Anthropic Claude</option>
          </select>
        </label>
        <label>Base URL
          <input id="baseUrl" placeholder="留空自动选用该格式默认域名">
        </label>
        <label>API Key
          <input id="apiKey" type="password" placeholder="留空则保留原 key">
        </label>
        <label>默认模型
          <input id="defaultModel" placeholder="如 deepseek-v4-flash / gpt-4o / gemini-2.5-pro / claude-opus-4-8">
        </label>
        <section class="settingsNote">
          <strong>界面许可说明</strong>
          <span>桌面端视觉为 Fathom 独立设计，基于 Python / pywebview 实现，内置工具调用、上下文压缩、技能与子代理能力。</span>
        </section>
        <menu>
          <button value="cancel" class="ghost">取消</button>
          <button id="saveSettings" value="default" class="primary">保存并刷新</button>
        </menu>
      </form>
    </dialog>
  </main>
  <script src="app.js"></script>
</body>
</html>
